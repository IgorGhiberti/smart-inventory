version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smartinventory-postgres
    environment:
      POSTGRES_DB: smart_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smartinventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: smartinventory-api
    working_dir: /src
    volumes:
      - ./SmartInventory:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=smart_inventory;Username=postgres;Password=postgres
    command: ["dotnet", "run", "--project", "SmartInventory.csproj", "--urls", "http://0.0.0.0:8080"]
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  smartinventory_pgdata:
